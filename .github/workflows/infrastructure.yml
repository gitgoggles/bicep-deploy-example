name: Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - ".github/workflows/infrastructure.yml"
  workflow_dispatch:

jobs:
  validate:
    name: Validate Bicep
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Compile template
        run: az bicep build --file infra/main.bicep --stdout > /dev/null

      - name: Compile parameters
        run: az bicep build-params --file infra/main.bicepparam --stdout > /dev/null

  deploy:
    name: Deploy production infrastructure
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: production-deployment
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Preview infrastructure changes
        run: |
          az deployment sub what-if --name bicep-deploy-example-prod --location uksouth --template-file infra/main.bicep --parameters infra/main.bicepparam

      - name: Deploy infrastructure
        run: |
          az deployment sub create --name bicep-deploy-example-prod --location uksouth --template-file infra/main.bicep --parameters infra/main.bicepparam --only-show-errors
