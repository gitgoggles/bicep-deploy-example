name: Application

on:
  pull_request:
    paths:
      - "src/**"
  workflow_dispatch:

jobs:
  build:
    name: Build API
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore src/Api/Api.csproj

      - name: Publish
        run: dotnet publish src/Api/Api.csproj --configuration Release --no-restore --output "${{ runner.temp }}/publish"

      - name: Create deployment package
        run: |
          cd "${{ runner.temp }}/publish"
          zip -r "${{ runner.temp }}/api.zip" .

      - name: Upload deployment package
        uses: actions/upload-artifact@v4
        with:
          name: api-package
          path: ${{ runner.temp }}/api.zip
          if-no-files-found: error
          retention-days: 1

  deploy:
    name: Deploy production API
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: production-deployment
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download deployment package
        uses: actions/download-artifact@v4
        with:
          name: api-package
          path: ${{ runner.temp }}

      - name: Log in to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Read Web App name from infrastructure deployment
        id: infrastructure
        shell: bash
        run: |
          web_app_name="$(az deployment sub show --name bicep-deploy-example-prod --query properties.outputs.webAppName.value --output tsv)"
          if [[ -z "$web_app_name" ]]; then
            echo 'The infrastructure deployment did not return a Web App name.' >&2
            exit 1
          fi
          echo "web_app_name=$web_app_name" >> "$GITHUB_OUTPUT"

      - name: Deploy API
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ steps.infrastructure.outputs.web_app_name }}
          package: ${{ runner.temp }}/api.zip
